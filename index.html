<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Аудит Рутини | Quiz</title>
    <!-- Підключаємо офіційний SDK Телеграм Веб-додатків -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-bg-color: #17212b;       /* Темний фон чату */
            --tg-header-bg: #242f3d;      /* Фон хенера */
            --tg-text-color: #ffffff;     /* Основний текст */
            --tg-secondary-text: #7f91a4; /* Сірий текст */
            --tg-msg-in: #182533;         /* Повідомлення бота (темна тема) */
            --tg-msg-out: #2b5278;        /* Повідомлення користувача */
            --tg-link-btn: #8774e1;       /* Кольорова кнопка */
            --tg-btn-text: #ffffff;
            --input-bg: #242f3d;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0e1621; 
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--tg-text-color);
            overflow: hidden;
        }

        /* Контейнер мобільного Телеграм */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: var(--tg-bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        @media (min-width: 500px) {
            .app-container {
                height: 90vh;
                border-radius: 16px;
                overflow: hidden;
                border: 1px solid #242f3d;
            }
        }

        /* Хедер */
        .header {
            background-color: var(--tg-header-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #121922;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-avatar {
            width: 38px;
            height: 38px;
            background-color: var(--tg-link-btn);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .header-info {
            display: flex;
            flex-direction: column;
        }

        .header-name {
            font-weight: 600;
            font-size: 14px;
        }

        .header-status {
            font-size: 11px;
            color: var(--tg-secondary-text);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #2ec4b6;
            border-radius: 50%;
            display: inline-block;
        }

        .badge-mode {
            font-size: 10px;
            background-color: #121922;
            padding: 3px 8px;
            border-radius: 6px;
            color: var(--tg-secondary-text);
            font-family: monospace;
        }

        /* Чат */
        .chat-area {
            flex: 1;
            padding: 20px 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        /* Дата розмежувальник */
        .date-divider {
            text-align: center;
            margin: 10px 0;
        }

        .date-label {
            background-color: rgba(36, 47, 61, 0.6);
            color: #a5b5c1;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Бульбашки повідомлень */
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.45;
            position: relative;
            word-wrap: break-word;
            animation: slideUp 0.25s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--tg-msg-in);
            border-bottom-left-radius: 4px;
            color: #f5f7fa;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--tg-msg-out);
            border-bottom-right-radius: 4px;
            color: #ffffff;
        }

        .message-time {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            margin-top: 5px;
            user-select: none;
        }

        /* Секція керування та вибору відповідей */
        .controls-area {
            background-color: var(--tg-header-bg);
            padding: 12px;
            border-top: 1px solid #121922;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 70px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-btn {
            background-color: var(--tg-bg-color);
            border: 1px solid rgba(135, 116, 225, 0.2);
            color: #55aaff;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s;
        }

        .option-btn:hover {
            background-color: rgba(135,116,225,0.1);
            border-color: var(--tg-link-btn);
            color: #fff;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        /* Текстовий інпут */
        .input-group {
            display: flex;
            gap: 8px;
            background-color: var(--tg-bg-color);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .text-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 12px;
            color: white;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            background-color: var(--tg-link-btn);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.15s;
        }

        .send-btn:hover {
            opacity: 0.95;
        }

        /* Спеціальна контактна форма для звичайного Веб-браузера */
        .contact-card {
            background-color: var(--tg-bg-color);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-title {
            font-size: 12px;
            font-weight: bold;
            color: #8774e1;
            margin-bottom: 4px;
        }

        .contact-field {
            background-color: var(--tg-header-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 13px;
            outline: none;
            width: 100%;
        }

        .contact-field:focus {
            border-color: var(--tg-link-btn);
        }

        .contact-btn {
            background-color: var(--tg-link-btn);
            color: white;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .contact-btn:hover {
            background-color: #7b68d4;
        }

        /* Кнопка відправки */
        .final-action {
            background-color: var(--tg-link-btn);
            color: white;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(135,116,225,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Анімація друку */
        .typing {
            display: inline-flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #7f91a4;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Статус фідбеку */
        .status-box {
            background-color: rgba(46, 196, 182, 0.1);
            border: 1px solid rgba(46, 196, 182, 0.3);
            color: #2ec4b6;
            font-size: 11px;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- Хедер -->
        <header class="header">
            <div class="header-left">
                <div class="header-avatar" id="bot-avatar">🤖</div>
                <div class="header-info">
                    <span class="header-name" id="bot-title">Yura Kotovich Bot</span>
                    <span class="header-status">
                        <span class="status-dot"></span>онлайн
                    </span>
                </div>
            </div>
            <div class="badge-mode" id="app-mode-badge">🌐 Світлий Веб</div>
        </header>

        <!-- Чат область -->
        <div class="chat-area" id="chat-area">
            <div class="date-divider">
                <span class="date-label" id="chat-date">Сьогодні</span>
            </div>
        </div>

        <!-- Область вибору дій/відповідей -->
        <div class="controls-area" id="controls-area">
            <!-- Сюди динамічно генеруються кнопки/інпути -->
        </div>
    </div>

    <script>
        // --- Налаштування стану системи ---
        const state = {
            step: 0,
            isTelegramMode: false,
            data: {
                name: "",
                email: "",
                phone: "",
                direction: "",
                experience: "",
                format: "",
                comment: ""
            }
        };

        const chatArea = document.getElementById('chat-area');
        const controlsArea = document.getElementById('controls-area');

        // Авто-детект Телеграму
        window.addEventListener('DOMContentLoaded', () => {
            const dateStr = new Date().toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
            document.getElementById('chat-date').innerText = dateStr.toUpperCase();

            try {
                const tg = window.Telegram?.WebApp;
                if (tg && tg.initData && tg.initData.length > 0) {
                    state.isTelegramMode = true;
                    document.getElementById('app-mode-badge').innerText = "💬 Telegram App";
                    tg.ready();
                    tg.expand();
                    
                    // Беруться дані юзера з Телеграм
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        const tgUser = tg.initDataUnsafe.user;
                        state.data.name = tgUser.first_name || "Telegram User";
                        state.data.email = tgUser.username ? `@${tgUser.username}` : "Не вказано";
                    }
                }
            } catch (e) {
                console.warn("Telegram API not reachable. Falling back to classic Web.");
            }

            // Запускаємо крок 1
            runStep(1);
        });

        function formatTime() {
            return new Date().toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
        }

        // Рендеримо друк бота
        function showBotMessage(text) {
            const typingId = 'typing-' + Date.now();
            
            // Показуємо анімацію друку
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = typingId;
            typingDiv.innerHTML = `<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            setTimeout(() => {
                typingDiv.remove();
                
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message bot';
                msgDiv.innerHTML = `
                    ${text}
                    <div class="message-time">${formatTime()}</div>
                `;
                chatArea.appendChild(msgDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 900);
        }

        // Рендеримо відповіді користувача
        function showUserMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `
                ${text}
                <div class="message-time">
                    <span>${formatTime()}</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: #4fc3f7; margin-left: 2px;"><path d="M20 6L9 17L4 12"/></svg>
                </div>
            `;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Сценарій квізу
        const scenario = {
            1: {
                text: "🤖 <b>Швидкий AI-аудит вашої рутини</b><br><br>Пройдіть тест за 60 секунд. Визначте, на якому етапі ви втрачаєте час із ChatGPT, та отримайте персональний план для нашої консультації.",
                type: 'options',
                options: [
                    { label: "Пройти безкоштовний аудит 🚀", value: "start", next: 2 }
                ]
            },
            2: {
                text: "Який напрямок ШІ вас цікавить найбільше?",
                type: 'options',
                field: 'direction',
                options: [
                    { label: "🎯 Інструменти та промптинг (стабільний результат)", value: "Інструменти та промптинг", next: 3 },
                    { label: "💻 AI для розробників (Cursor/Copilot)", value: "AI для розробників", next: 3 },
                    { label: "⚙️ Автоматизація та агенти (кастомні помічники)", value: "Автоматизація та агенти", next: 3 },
                    { label: "🖼️ Генерація контенту (Midjourney, Flux, відео)", value: "Генерація контенту", next: 3 }
                ]
            },
            3: {
                text: "Який ваш поточний досвід роботи з нейромережами?",
                type: 'options',
                field: 'experience',
                options: [
                    { label: "🌱 Новачок (хочу стартувати правильно)", value: "Новачок", next: 4 },
                    { label: "⚡ Практик (є результат, але хаотичний)", value: "Практик", next: 4 },
                    { label: "💼 Підприємець / Профі (шукаю автоматизацію)", value: "Підприємець / Профі", next: 4 }
                ]
            },
            4: {
                text: "Який формат розбору вашого кейсу для вас найзручніший?",
                type: 'options',
                field: 'format',
                options: [
                    { label: "📞 Живий созвон в Telegram (голос + демо)", value: "Живий созвон", next: 5 },
                    { label: "✍️ Текстовий розбір (промпти та інструкції)", value: "Текстовий розбір", next: 5 }
                ]
            },
            5: {
                text: "Опишіть ваше головне завдання або біль (опціонально).<br><br>💡 <i>Приклад: «Хочу автоматизувати звітність», «Cursor заплутався в коді», «Шукаю промпт».</i>",
                type: 'input',
                placeholder: 'Введіть ваш кейс...',
                next: 6
            },
            6: {
                // Цей крок вирішує: показувати контактну форму чи пропустити, якщо ми в TG
                text: "👤 <b>Залиште контакти для зворотного зв'язку</b><br><br>Оскільки ви зайшли як гість з сайту, вкажіть контакти, куди надіслати підсумки аудиту.",
                type: 'contact_form',
                next: 7
            },
            7: {
                text: "🧠 <b>Аудит завершено!</b><br><br>Ваші відповіді зафіксовано. Тепер ми точно знаємо, з чого почати.<br><br>Натисніть велику кнопку підтвердження нижче, щоб завершити реєстрацію та відправити результати!",
                type: 'final'
            }
        };

        function runStep(stepNum) {
            state.step = stepNum;
            const stepData = scenario[stepNum];
            if (!stepData) return;

            // Спеціальний пропуск кроку 6 (контакти), якщо користувач в Telegram
            if (stepNum === 6 && state.isTelegramMode) {
                runStep(7);
                return;
            }

            showBotMessage(stepData.text);

            setTimeout(() => {
                controlsArea.innerHTML = '';
                
                if (stepData.type === 'options') {
                    renderOptions(stepData.options, stepData.field);
                } else if (stepData.type === 'input') {
                    renderInput(stepData.placeholder, stepData.next);
                } else if (stepData.type === 'contact_form') {
                    renderContactForm(stepData.next);
                } else if (stepData.type === 'final') {
                    renderFinalButton();
                }
            }, 1000);
        }

        // Рендер варіантів кнопок
        function renderOptions(options, field) {
            const grid = document.createElement('div');
            grid.className = 'options-grid';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${opt.label}</span> <span>➔</span>`;
                btn.onclick = () => {
                    showUserMessage(opt.label);
                    if (field) state.data[field] = opt.value;
                    controlsArea.innerHTML = '';
                    runStep(opt.next);
                };
                grid.appendChild(btn);
            });
            controlsArea.appendChild(grid);
        }

        // Рендер текстового поля
        function renderInput(placeholder, nextStepNum) {
            const container = document.createElement('div');
            container.className = 'input-group';
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'text-input';
            input.placeholder = placeholder;
            
            input.onkeydown = (e) => {
                if (e.key === 'Enter') sendBtn.click();
            };

            const sendBtn = document.createElement('button');
            sendBtn.className = 'send-btn';
            sendBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/></svg>`;
            
            sendBtn.onclick = () => {
                const val = input.value.trim() || "Пропущено";
                showUserMessage(val);
                state.data.comment = val;
                controlsArea.innerHTML = '';
                runStep(nextStepNum);
            };

            container.appendChild(input);
            container.appendChild(sendBtn);
            controlsArea.appendChild(container);
            setTimeout(() => input.focus(), 200);
        }

        // Рендер форми для неавторизованих вебликів
        function renderContactForm(nextStepNum) {
            const card = document.createElement('div');
            card.className = 'contact-card';
            card.innerHTML = `
                <div class="contact-title">Ваші контакти:</div>
                <input type="text" id="c-name" class="contact-field" placeholder="Ім'я..." required>
                <input type="email" id="c-mail" class="contact-field" placeholder="Email..." required>
                <input type="text" id="c-phone" class="contact-field" placeholder="Телефон / Юзернейм...">
                <button id="c-submit" class="contact-btn">Зберегти контакти ➔</button>
            `;
            controlsArea.appendChild(card);

            document.getElementById('c-submit').onclick = () => {
                const nm = document.getElementById('c-name').value.trim();
                const em = document.getElementById('c-mail').value.trim();
                const ph = document.getElementById('c-phone').value.trim();

                if (!nm || !em) {
                    alert("Ім'я та Email є обов'язковими!");
                    return;
                }

                state.data.name = nm;
                state.data.email = em;
                state.data.phone = ph || "Не вказано";

                showUserMessage(`Контакти збережено: ${nm} (${em})`);
                controlsArea.innerHTML = '';
                runStep(nextStepNum);
            };
        }

        // Фінальна кнопка відправки та переадресації
        function renderFinalButton() {
            const btn = document.createElement('button');
            btn.className = 'final-action';
            btn.innerHTML = `<span>👉 ВІДПРАВИТИ ТА ЗАБРОНЮВАТИ МІСЦЕ</span>`;
            
            btn.onclick = async () => {
                btn.disabled = true;
                btn.innerText = "НАДСИЛАННЯ РЕЗУЛЬТАТІВ...";

                const payload = {
                    source: state.isTelegramMode ? "Telegram WebApp" : "Website",
                    name: state.data.name || "Гість",
                    email: state.data.email || "Не вказано",
                    phone: state.data.phone || "Не вказано",
                    direction: state.data.direction || "Не вибрано",
                    experience: state.data.experience || "Не вибрано",
                    format: state.data.format || "Не вибрано",
                    comment: state.data.comment || "Не вказано"
                };

                // Відправляємо на захищений Cloudflare Pages Function backend proxy
                try {
                    await fetch('/api/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } catch(e) {
                    console.error("Помилка відправки на бекенд:", e);
                }

                // Показуємо статус успішності в чаті
                const statusBox = document.createElement('div');
                statusBox.className = 'status-box';
                statusBox.innerText = "✓ Заявка успішно зафіксована! Перенаправляємо в чат до Юри...";
                controlsArea.innerHTML = '';
                controlsArea.appendChild(statusBox);

                // Через 1 секунду перекидаємо користувача в приватні до Юри з pre-filled повідомленням!
                setTimeout(() => {
                    let textMsg = `Привіт, Юро! Я пройшов Швидкий AI-аудит 🤖\n\n`;
                    textMsg += `🎯 Напрямок: ${payload.direction}\n`;
                    textMsg += `📊 Досвід: ${payload.experience}\n`;
                    textMsg += `📞 Формат: ${payload.format}\n`;
                    textMsg += `📝 Мій кейс: ${payload.comment}\n`;
                    textMsg += `👤 Джерело: ${payload.source} (${payload.name})`;
                    
                    const url = `https://t.me/yura_kotovich?text=${encodeURIComponent(textMsg)}`;
                    
                    if (state.isTelegramMode) {
                        window.open(url, '_blank');
                        // Спроба закрити WebApp у Телеграм
                        if (window.Telegram?.WebApp) {
                            window.Telegram.WebApp.close();
                        }
                    } else {
                        window.open(url, '_blank');
                    }
                }, 1200);
            };

            controlsArea.appendChild(btn);
        }
    </script>
</body>
</html>
