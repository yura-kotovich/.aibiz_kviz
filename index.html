<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Аудит Рутини | Quiz</title>
    <!-- Підключення Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-bg-color: #17212b;
            --tg-header-bg: #242f3d;
            --tg-text-color: #ffffff;
            --tg-secondary-text: #7f91a4;
            --tg-msg-in: #182533;
            --tg-msg-out: #2b5278;
            --tg-link-btn: #8774e1;
            --tg-btn-text: #ffffff;
            --input-bg: #242f3d;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0e1621;
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--tg-text-color);
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: var(--tg-bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 500px) {
            .app-container {
                height: 90vh;
                border-radius: 16px;
                overflow: hidden;
                border: 1px solid #0e1621;
                box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            }
        }

        .header {
            background-color: var(--tg-header-bg);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #0e1621;
        }

        .header-avatar {
            width: 38px;
            height: 38px;
            background-color: #8774e1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }

        .header-info { display: flex; flex-direction: column; }
        .header-name { font-weight: 600; font-size: 15px; }
        .header-status { font-size: 11px; color: #4fc3f7; }

        .chat-area {
            flex: 1;
            padding: 20px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.45;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--tg-msg-in);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--tg-msg-out);
            border-bottom-right-radius: 4px;
        }

        .message-time {
            display: block;
            text-align: right;
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        .controls-area {
            background-color: var(--tg-header-bg);
            padding: 12px;
            border-top: 1px solid #0e1621;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .options-grid { display: grid; gap: 8px; }

        .option-btn {
            background: #17212b;
            border: 1px solid rgba(135, 116, 225, 0.2);
            color: #4fc3f7;
            padding: 12.5px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 13.5px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .option-btn:hover {
            background: rgba(135, 116, 225, 0.15);
            color: #fff;
            border-color: var(--tg-link-btn);
        }

        .input-group { display: flex; gap: 8px; }

        .text-input {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-family: inherit;
            font-size: 13.5px;
            outline: none;
            transition: border 0.2s;
        }

        .text-input:focus { border-color: var(--tg-link-btn); }

        .send-btn {
            width: 44px;
            height: 44px;
            background-color: var(--tg-link-btn);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background-color: #17212b;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .form-input {
            width: 100%;
            background-color: var(--tg-header-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .form-input:focus { border-color: var(--tg-link-btn); }

        .final-action {
            background-color: var(--tg-link-btn);
            color: white;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
            width: 100%;
        }

        .final-action:hover { opacity: 0.9; }

        .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #9ab;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <span class="header-name">Yura Kotovich Quiz Bot</span>
                <span class="header-status">онлайн</span>
            </div>
        </header>

        <div class="chat-area" id="chat-area"></div>
        <div class="controls-area" id="controls-area"></div>
    </div>

    <script>
        const state = {
            step: 1,
            isTelegram: false,
            tgUser: null,
            data: {
                name: "",
                email: "",
                phone: "",
                direction: "",
                experience: "",
                format: "",
                comment: ""
            }
        };

        // Запуск визначення Telegram WebApp контексту
        try {
            const tg = window.Telegram?.WebApp;
            if (tg && tg.initData) {
                state.isTelegram = true;
                tg.ready();
                tg.expand();
                if (tg.initDataUnsafe?.user) {
                    state.tgUser = tg.initDataUnsafe.user;
                    state.data.name = tg.initDataUnsafe.user.first_name || "Користувач Telegram";
                }
            }
        } catch(e) {
            console.log("Not in Telegram Client");
        }

        const chatArea = document.getElementById('chat-area');
        const controlsArea = document.getElementById('controls-area');

        function getCurrentTime() {
            return new Date().toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
        }

        function addBotMessage(text) {
            const typingId = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = typingId;
            typingDiv.innerHTML = `<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            setTimeout(() => {
                typingDiv.remove();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message bot';
                msgDiv.innerHTML = `${text}<span class="message-time">${getCurrentTime()}</span>`;
                chatArea.appendChild(msgDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 800);
        }

        function addUserMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `${text}<span class="message-time">${getCurrentTime()}</span>`;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        const scenario = {
            1: {
                text: () => `🤖 <b>Швидкий AI-аудит вашої рутини</b><br><br>Вітаю! Пройдіть тест за 60 секунд. Визначте, на якому етапі ви втрачаєте час із ChatGPT, та отримайте персональний план для нашої ШІ-консультації.`,
                type: 'options',
                options: [{ label: 'Пройти безкоштовний аудит 🚀', value: 'start' }]
            },
            2: {
                text: () => `Який напрямок ШІ вас цікавить найбільше?`,
                type: 'options',
                field: 'direction',
                options: [
                    { label: '🎯 Промптинг та робота в чатах', value: 'Промптинг' },
                    { label: '💻 AI для IT та кодингу (Cursor...)', value: 'AI для IT' },
                    { label: '⚙️ Особисті ШІ-агенти та автоматизація', value: 'Автоматизація' },
                    { label: '🖼️ Креативні нейромережі (дизайн, відео)', value: 'Креатив' }
                ]
            },
            3: {
                text: () => `Ваш поточний досвід роботи з нейромережами?`,
                type: 'options',
                field: 'experience',
                options: [
                    { label: 'Новачок (хочу почати без помилок)', value: 'Новачок' },
                    { label: 'Практик (користуюся часом, але хаотично)', value: 'Практик' },
                    { label: 'Профі / Бізнес (шукаю кастомні рішення)', value: 'Профі' }
                ]
            },
            4: {
                text: () => `У якому форматі провести безкоштовний розбір?`,
                type: 'options',
                field: 'format',
                options: [
                    { label: '📞 Созвон у Telegram (демо екрану)', value: 'Дзвінок' },
                    { label: '✍️ Текстовий аудит вашого кейсу', value: 'Текстовий розбір' }
                ]
            },
            5: {
                text: () => `Опишіть ваше головне завдання або рутину, яку хочете автоматизувати (опціонально).`,
                type: 'input',
                field: 'comment',
                placeholder: 'Введіть коментар або натисніть Enter...'
            },
            6: {
                text: () => `👤 <b>Контактна інформація</b><br><br>Ми помітили, що ви переглядаєте сайт з браузера. Введіть ваші дані, щоб ми зберегли результати та надіслали аналіз.`,
                type: 'contact_form'
            },
            7: {
                text: () => `🧠 <b>Аудит завершено!</b><br><br>Дані успішно зафіксовано. Тепер ми точно знаємо, з чого розпочати.<br><br><b>Натисніть кнопку нижче, щоб автоматично зберегти відповіді та написати Юрі в особисті чати!</b>`,
                type: 'final'
            }
        };

        function runStep(stepNum) {
            // Якщо ми в Telegram — пропускаємо крок 6 (Форма контактів), адже знаємо юзера з API
            if (state.isTelegram && stepNum === 6) {
                state.step = 7;
                runStep(7);
                return;
            }

            const stepData = scenario[stepNum];
            if (!stepData) return;

            setTimeout(() => {
                addBotMessage(stepData.text());
                setTimeout(() => {
                    renderControls(stepData);
                }, 900);
            }, 300);
        }

        function renderControls(stepData) {
            controlsArea.innerHTML = '';

            if (stepData.type === 'options') {
                const grid = document.createElement('div');
                grid.className = 'options-grid';
                stepData.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt.label;
                    btn.onclick = () => {
                        addUserMessage(opt.label);
                        if (stepData.field) state.data[stepData.field] = opt.value;
                        controlsArea.innerHTML = '';
                        state.step++;
                        runStep(state.step);
                    };
                    grid.appendChild(btn);
                });
                controlsArea.appendChild(grid);
            } 
            else if (stepData.type === 'input') {
                const group = document.createElement('div');
                group.className = 'input-group';
                const input = document.createElement('input');
                input.className = 'text-input';
                input.placeholder = stepData.placeholder;
                
                const sendBtn = document.createElement('button');
                sendBtn.className = 'send-btn';
                sendBtn.innerHTML = '➔';

                const submitInput = () => {
                    const val = input.value.trim() || "Пропущено";
                    addUserMessage(val);
                    state.data.comment = val;
                    controlsArea.innerHTML = '';
                    state.step++;
                    runStep(state.step);
                };

                input.onkeydown = (e) => { if (e.key === 'Enter') submitInput(); };
                sendBtn.onclick = submitInput;

                group.appendChild(input);
                group.appendChild(sendBtn);
                controlsArea.appendChild(group);
                input.focus();
            } 
            else if (stepData.type === 'contact_form') {
                const form = document.createElement('div');
                form.className = 'form-container';
                form.innerHTML = `
                    <input type="text" id="c-name" class="form-input" placeholder="Ваше ім'я" required>
                    <input type="text" id="c-email" class="form-input" placeholder="Telegram нікнейм або Email" required>
                    <input type="text" id="c-phone" class="form-input" placeholder="Номер телефону (опціонально)">
                    <button id="form-submit-btn" class="final-action">Зберегти та продовжити ➔</button>
                `;
                controlsArea.appendChild(form);

                document.getElementById('form-submit-btn').onclick = () => {
                    const nameVal = document.getElementById('c-name').value.trim();
                    const emailVal = document.getElementById('c-email').value.trim();
                    const phoneVal = document.getElementById('c-phone').value.trim();

                    if (!nameVal || !emailVal) {
                        alert("Будь ласка, введіть ім'я та контакт для зв'язку!");
                        return;
                    }

                    state.data.name = nameVal;
                    state.data.email = emailVal;
                    state.data.phone = phoneVal || "Не вказано";

                    addUserMessage(`Контакти збережено: ${nameVal}`);
                    controlsArea.innerHTML = '';
                    state.step++;
                    runStep(state.step);
                };
            } 
            else if (stepData.type === 'final') {
                const btn = document.createElement('button');
                btn.className = 'final-action';
                btn.textContent = '👉 НАДІСЛАТИ РЕЗУЛЬТАТИ ТА НАПИСАТИ ЮРІ';
                btn.onclick = sendDataAndRedirect;
                controlsArea.appendChild(btn);
            }
        }

        async function sendDataAndRedirect() {
            // Збираємо корисне навантаження
            const payload = {
                source: state.isTelegram ? "Telegram Bot" : "Website",
                q1: state.data.name || (state.tgUser ? `${state.tgUser.first_name} (@${state.tgUser.username || ''})` : "Сайт Клієнт"),
                q2: state.data.direction || "Не вибрано",
                q3: state.data.experience || "Не вибрано",
                email: state.data.email || (state.tgUser ? `@${state.tgUser.username || ''}` : "Не вказано"),
                comment: state.data.comment || "Не введено"
            };

            // Візуальний статус завантаження на кнопці
            const btn = document.querySelector('.final-action');
            btn.textContent = '⏳ НАДСИЛАННЯ / ЗБЕРЕЖЕННЯ...';
            btn.disabled = true;

            // Відправляємо на наш серверний проксі бекенд Cloudflare Functions
            try {
                await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch(e) {
                console.error("Server submission failed", e);
            }

            // Формуємо красивий пре-заповнений текст для чату з тобою
            let messageText = `Привіт, Юра! Я пройшов Швидкий AI-Аудит 🤖\n\n`;
            messageText += `🎯 Напрямок: ${payload.q2}\n`;
            messageText += `📈 Досвід: ${payload.q3}\n`;
            messageText += `📞 Спосіб розбору: ${state.data.format || 'Не обрано'}\n`;
            messageText += `📝 Задача: ${payload.comment}\n`;
            messageText += `👤 Контакти: ${payload.q1} (${payload.email})`;

            const encoded = encodeURIComponent(messageText);
            btn.textContent = 'УСПІШНО! Перехід у чат...';

            setTimeout(() => {
                window.open(`https://t.me/yura_kotovich?text=${encoded}`, '_blank');
            }, 800);
        }

        // Запуск квізу
        window.onload = () => { runStep(1); };
    </script>
</body>
</html>
