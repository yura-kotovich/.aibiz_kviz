<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Аудит Рутини | Quiz</title>
    <!-- Telegram Web App Support -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-bg-color: #17212b;       
            --tg-header-bg: #242f3d;      
            --tg-text-color: #ffffff;     
            --tg-secondary-text: #7f91a4; 
            --tg-msg-in: #182533;         
            --tg-msg-out: #2b5278;        
            --tg-link-btn: #8774e1;       
            --tg-btn-text: #ffffff;
            --input-bg: #242f3d;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0e1621;
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--tg-text-color);
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: var(--tg-bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        @media (min-width: 500px) {
            .app-container {
                height: 90vh;
                border-radius: 12px;
                overflow: hidden;
                border: 1px solid #111e2d;
            }
        }

        .header {
            background-color: var(--tg-header-bg);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #0e1621;
            z-index: 10;
        }

        .header-avatar {
            width: 38px;
            height: 38px;
            background-color: #8774e1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }

        .header-info {
            display: flex;
            flex-direction: column;
        }

        .header-name {
            font-weight: 600;
            font-size: 15px;
        }

        .header-status {
            font-size: 11px;
            color: #4bacf0;
        }

        .chat-area {
            flex: 1;
            padding: 20px 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.45;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--tg-msg-in);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--tg-msg-out);
            border-bottom-right-radius: 4px;
        }

        .message-time {
            display: block;
            text-align: right;
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        .controls-area {
            background-color: var(--tg-header-bg);
            padding: 12px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid #0e1621;
        }

        .options-grid {
            display: grid;
            gap: 8px;
        }

        .option-btn {
            background: #17212b;
            border: 1px solid rgba(255,255,255,0.08);
            color: #4bacf0;
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 13.5px;
            transition: all 0.15s ease;
        }

        .option-btn:hover {
            background: rgba(135, 116, 225, 0.12);
            border-color: var(--tg-link-btn);
            color: white;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .text-input {
            flex: 1;
            background-color: var(--tg-bg-color);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 11px 14px;
            color: white;
            font-family: inherit;
            font-size: 13.5px;
            outline: none;
            transition: border-color 0.2s;
        }

        .text-input:focus {
            border-color: var(--tg-link-btn);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background-color: var(--tg-link-btn);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.15s;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .contact-form {
            background: #17212b;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }

        .contact-input {
            width: 100%;
            background: var(--tg-header-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 13px;
            outline: none;
        }

        .contact-input:focus {
            border-color: var(--tg-link-btn);
        }

        .final-action {
            background-color: var(--tg-link-btn);
            color: white;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .final-action:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing-bubble {
            align-self: flex-start;
            background-color: var(--tg-msg-in);
            padding: 12px 16px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #7f91a4;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="header-avatar">🤖</div>
            <div class="header-info">
                <span class="header-name">Kotovich Assistant</span>
                <span class="header-status">онлайн</span>
            </div>
        </header>

        <div class="chat-area" id="chat-area"></div>
        <div class="controls-area" id="controls-area"></div>
    </div>

    <script>
        // Детект запуску всередині Telegram WebApp або за межами
        let isTelegram = false;
        let telegramUser = null;
        try {
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "") {
                isTelegram = true;
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                telegramUser = window.Telegram.WebApp.initDataUnsafe?.user;
            }
        } catch (e) {
            console.warn("Помилка ініціалізації Telegram WebApp API", e);
        }

        const state = {
            step: 0,
            data: {
                name: (telegramUser ? telegramUser.first_name : ""),
                email: "",
                phone: "",
                direction: "",
                experience: "",
                format: "",
                comment: ""
            }
        };

        const chatArea = document.getElementById('chat-area');
        const controlsArea = document.getElementById('controls-area');

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit' });
        }

        function addBotMessage(text, callback) {
            const typingBubble = document.createElement('div');
            typingBubble.className = 'typing-bubble';
            typingBubble.innerHTML = `
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatArea.appendChild(typingBubble);
            chatArea.scrollTop = chatArea.scrollHeight;

            setTimeout(() => {
                typingBubble.remove();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message bot';
                msgDiv.innerHTML = `${text}<span class="message-time">${getCurrentTime()}</span>`;
                chatArea.appendChild(msgDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
                if (callback) callback();
            }, 1000);
        }

        function addUserMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = `${text}<span class="message-time">${getCurrentTime()}</span>`;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        const scenario = {
            1: {
                text: `🤖 <b>Швидкий AI-аудит вашої рутини</b><br><br>Пройдіть тест за 60 секунд. Визначте, на якому етапі ви втрачаєте час із ChatGPT, та отримайте персональний план для нашої консультації.`,
                type: 'options',
                options: [{ label: 'Пройти безкоштовний аудит 🚀', value: 'start', action: true }]
            },
            2: {
                text: `Який напрямок ШІ вас цікавить найбільше?`,
                type: 'options',
                field: 'direction',
                options: [
                    { label: '🎯 Інструменти та промптинг (стабільний результат)', value: 'Інструменти та промптинг' },
                    { label: '💻 AI для розробників (Cursor/Copilot)', value: 'AI для розробників' },
                    { label: '⚙️ Автоматизація та агенти (кастомні помічники)', value: 'Автоматизація та агенти' },
                    { label: '🖼️ Генерація контенту (Midjourney, Flux, відео)', value: 'Генерація контенту' },
                    { label: '👤 В мене своє питання', value: 'В мене своє питання' }
                ]
            },
            3: {
                text: `Який ваш поточний досвід роботи з нейромережами?`,
                type: 'options',
                field: 'experience',
                options: [
                    { label: '🌱 Новачок (хочу стартувати правильно)', value: 'Новачок' },
                    { label: '⚡ Практик (є результат, але хаотичний)', value: 'Практик' },
                    { label: '💼 Підприємець / Профі (шукаю автоматизацію)', value: 'Підприємець / Профі' },
                    { label: '🗨 Не хочу вказувати', value: 'Не хочу вказувати' }
                ]
            },
            4: {
                text: `Який формат розбору вашого кейсу для вас найзручніший?`,
                type: 'options',
                field: 'format',
                options: [
                    { label: '📞 Живий созвон в Telegram (голос + демо)', value: 'Живий созвон' },
                    { label: '✍️ Текстовий розбір (промпти та інструкції)', value: 'Текстовий розбір' }
                ]
            },
            5: {
                text: `Опишіть ваше головне завдання або біль (опціонально).<br><br>💡 Приклад: «Хочу автоматизувати звітність», «Cursor заплутався в коді», «Шукаю промпт».`,
                type: 'input',
                placeholder: 'Напишіть або натисніть Надіслати щоб пропустити...'
            },
            6: {
                text: `👤 <b>Залиште ваші контакти для зв'язку</b><br><br>Будь ласка, вкажіть ваше ім'я та email/телефон, щоб ми надіслали вам підготовлений аналіз.`,
                type: 'contact_form'
            },
            7: {
                text: `🧠 <b>Аудит завершено!</b><br><br>Ваші відповіді зафіксовано. Тепер ми точно знаємо, з чого почати консультацію.<br><br><b>Натисніть кнопку нижче, щоб надіслати форму та написати Юрі в особисті.</b>`,
                type: 'final'
            }
        };

        function runStep(stepNum) {
            state.step = stepNum;
            const stepData = scenario[stepNum];
            if (!stepData) return;

            // Якщо ми в Telegram WebApp - пропускаємо форму контактів (Крок 6)
            if (isTelegram && stepNum === 6) {
                runStep(7);
                return;
            }

            addBotMessage(stepData.text, () => {
                if (stepData.type === 'options') {
                    showOptions(stepData.options);
                } else if (stepData.type === 'input') {
                    showInputField(stepData.placeholder);
                } else if (stepData.type === 'contact_form') {
                    showContactForm();
                } else if (stepData.type === 'final') {
                    showFinalButton();
                }
            });
        }

        function showOptions(options) {
            controlsArea.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'options-grid';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.label;
                btn.onclick = () => {
                    addUserMessage(opt.label);
                    controlsArea.innerHTML = '';
                    if (!opt.action) {
                        state.data[scenario[state.step].field] = opt.value;
                    }
                    setTimeout(() => runStep(state.step + 1), 500);
                };
                grid.appendChild(btn);
            });
            controlsArea.appendChild(grid);
        }

        function showInputField(placeholder) {
            controlsArea.innerHTML = '';
            const group = document.createElement('div');
            group.className = 'input-group';

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'text-input';
            input.placeholder = placeholder;

            const btn = document.createElement('button');
            btn.className = 'send-btn';
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`;

            const submitValue = () => {
                const val = input.value.trim() || "Пропущено";
                state.data.comment = val;
                addUserMessage(val);
                controlsArea.innerHTML = '';
                setTimeout(() => runStep(state.step + 1), 500);
            };

            btn.onclick = submitValue;
            input.onkeydown = (e) => { if (e.key === 'Enter') submitValue(); };

            group.appendChild(input);
            group.appendChild(btn);
            controlsArea.appendChild(group);
            setTimeout(() => input.focus(), 150);
        }

        function showContactForm() {
            controlsArea.innerHTML = '';
            const form = document.createElement('div');
            form.className = 'contact-form';

            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.className = 'contact-input';
            nameInput.placeholder = "Ваше ім'я";
            nameInput.value = state.data.name;

            const emailInput = document.createElement('input');
            emailInput.type = 'text';
            emailInput.className = 'contact-input';
            emailInput.placeholder = "Ваш Email або Telegram нік";

            const btn = document.createElement('button');
            btn.className = 'final-action';
            btn.textContent = "Зберегти та продовжити ➔";

            btn.onclick = () => {
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();
                if (!name || !email) {
                    alert("Будь ласка, заповніть обидва поля!");
                    return;
                }
                state.data.name = name;
                state.data.email = email;
                addUserMessage(`Мене звати ${name}, контакт: ${email}`);
                controlsArea.innerHTML = '';
                setTimeout(() => runStep(state.step + 1), 500);
            };

            form.appendChild(nameInput);
            form.appendChild(emailInput);
            form.appendChild(btn);
            controlsArea.appendChild(form);
        }

        function showFinalButton() {
            controlsArea.innerHTML = '';
            const btn = document.createElement('button');
            btn.className = 'final-action';
            btn.id = 'submit-btn-quiz';
            btn.textContent = '🚀 НАДІСЛАТИ ТА НАПИСАТИ В ОСОБИСТІ';

            btn.onclick = sendResultsToServer;
            controlsArea.appendChild(btn);
        }

        function sendResultsToServer() {
            const submitBtn = document.getElementById('submit-btn-quiz');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = '⏱️ НАДСИЛАННЯ ДАНИХ...';
            }

            const payload = {
                source: isTelegram ? "Telegram WebApp" : "Website",
                name: state.data.name || (telegramUser ? telegramUser.first_name : "Анонімний користувач"),
                email: state.data.email || (telegramUser ? `@${telegramUser.username || 'tg'}` : "Не вказано"),
                phone: state.data.phone || "Не вказано",
                direction: state.data.direction || "Не вказано",
                experience: state.data.experience || "Не вказано",
                format: state.data.format || "Не вказано",
                comment: state.data.comment || "Не вказано"
            };

            // Надсилаємо дані на бекенд у Cloudflare на API
            fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                openTelegramChat(payload);
            })
            .catch(err => {
                console.error("Бекенд відповів із помилкою, але відкриваємо чат:", err);
                openTelegramChat(payload);
            });
        }

        function openTelegramChat(payload) {
            let message = `Привіт, Юра! Пройшов AI-аудит 🤖\n\n`;
            message += `🎯 Напрямок: ${payload.direction}\n`;
            message += `📈 Досвід: ${payload.experience}\n`;
            message += `📞 Формат: ${payload.format}\n`;
            message += `📝 Мій кейс: ${payload.comment}\n`;
            if (payload.source !== "Telegram WebApp") {
                message += `👤 Контакти: ${payload.name} (${payload.email})\n`;
            }
            message += `\nХочу забронювати місце на консультацію.`;

            const encodedMessage = encodeURIComponent(message);
            window.open(`https://t.me/yura_kotovich?text=${encodedMessage}`, '_blank');
        }

        window.onload = () => {
            setTimeout(() => runStep(1), 500);
        };
    </script>
</body>
</html>
